name: Build and deploy SupplyWatch backend to Azure Web App

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Zip artifact for deployment
        run: |
          cd ${{ github.workspace }}/backend
          zip -r ${{ github.workspace }}/release.zip . \
            -x './.env' './supplywatch.db' './__pycache__/*' \
               './engine/__pycache__/*' './fetchers/__pycache__/*' \
               './routers/__pycache__/*' './services/__pycache__/*' \
               './ws/__pycache__/*' './enrichment/__pycache__/*'

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: ${{ github.workspace }}/release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SupplyWatch'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_SUPPLYWATCH }}
          package: release.zip
